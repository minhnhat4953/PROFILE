<body class="BodyStyle">
    <div class="td-lock-screen">

            <div class="infos">

            <img class="loading-img" src="https://i.imgur.com/dxVZLOG.png">
            <div id="loading-percentage">0%</div>

    <main id="td-main">

            <h2><a href="#" class="site-icon">Hoàng Minh Nhật</a></h2>
            <div class="site-buttons">
                <button class="site-button mode-loveday"><i class="ri-heart-2-line"></i></button>
                <button class="site-button change-skin"><i class="ri-sun-line"></i></button>
            </div>
        </header>

        <section class="td-content">
            <div class="about-me">
                <div class="info-left"><span class="tag">Designer</span><span class="tag">Developer</span></div>
                <div class="avatar">
                    <img class="avatar-img" src="https://i.imgur.com/dxVZLOG.png">
                    <img class="crown" src="./res/v5/img/crown/mong-vuot-rong.png">
                </div>
                <div class="info-right"><span class="tag">Music</span><span class="tag">Friendly</span></div>
            </div>
            <h2 class="HoVaTen__"><span>Hoàng Minh Nhật</span></h2>
            
            <section id="hr-mod" style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
                <a href="https://facebook.com" target="_blank"><img src="./res/v5/img/social/facebook.webp" width="40"></a>
                <a href="https://zalo.me" target="_blank"><img src="./res/v5/img/social/zalo.webp" width="40"></a>
                <a href="https://tiktok.com" target="_blank"><img src="./res/v5/img/social/tiktok.webp" width="40"></a>
            </section>
        </section>

        <div id="td-lovedays" style="text-align:center; margin-top:30px;">
            <div class="love-time1">
                <span id="day">00</span> Ngày <span id="hours">00</span> Giờ
            </div>
        </div>
    </main>

    <marquee style="font-weight: bold; color: white; position: fixed; bottom: 50px;">
        Chào mừng bạn đến với Profile của Hoàng Minh Nhật - Chúc bạn một ngày tốt lành! ✨🔥
    </marquee>

    <footer id="footer">
        <a href="https://minhnhatvtv.mssg.me" target="_blank">&copy; Minh Nhat 2026</a>
    </footer>

    <script src="./res/v5/libs/jquery/jquery-3.6.0.min.js"></script>

        // Xử lý Loading và Mở khóa
        $(window).on('load', function() {
            let pct = 0;
            let interval = setInterval(() => {
                pct += 5;
                $('#loading-percentage').text(pct + '%');
                if(pct >= 100) {
                    clearInterval(interval);
                    $('#loading-box').fadeOut();
                    $('.close-lockscreen').click(function() {
                        $('.td-lock-screen').fadeOut();
