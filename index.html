<!DOCTYPE html>
<html lang="en" class="theme-custom">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Hoàng Minh Nhật Profile</title>
    <link rel="shortcut icon" href="https://i.imgur.com/dxVZLOG.png" type="image/x-icon">
    <link rel="stylesheet" href="./res/v5/css/ws.theme.css">
    <link rel="stylesheet" href="./res/v5/css/animation.css">
    <link rel="stylesheet" href="./res/v5/css/index.css?v=999">
    <link rel="stylesheet" href="./res/v5/css/style.css">
    <link rel="stylesheet" href="./res/v5/css/custom-love.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css" rel="stylesheet">
    <style>
        /* Menu WS Settings chuẩn */
        #WS-Settings {
            position: fixed; right: -300px; top: 0; width: 280px; height: 100%;
            background: #fff; z-index: 10000; transition: 0.4s; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); color: #333; overflow-y: auto;
        }
        #WS-Settings.active { right: 0; }
        
        /* Đồng hồ thời gian thực ở dưới màn hình */
        .real-time-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; color: white; z-index: 100; width: 100%;
        }
        #current-time {
            font-size: 35px; font-weight: bold; font-family: 'Arial', sans-serif;
            text-shadow: 0 0 10px rgba(255,255,255,0.5); letter-spacing: 2px;
        }
        #current-date { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .td-lock-screen { cursor: pointer; z-index: 9999; }
        .love-days-box { margin-top: 15px; text-align: center; color: #ff4d6d; font-weight: bold; }
    </style>
</head>
<body class="BodyStyle" id="bodyMain">
    <div class="td-lock-screen" id="lockScreen">
        <section class="td-welcome">
            <div class="medias">
                <video class="item_video" autoplay loop muted playsinline><source src="./res/v5/files/video/hutao.mp4" type="video/mp4"></video>
            </div>
            <div class="infos">
                <div class="logo-web-title"><img class="logo-ws" src="https://i.imgur.com/dxVZLOG.png"><span class="web-title">𝑯𝒐𝑩𝒂𝑴𝒚</span></div>
                <span class="web_desc">Chạm để mở Profile</span>
            </div>
        </section>
    </div>

    <header id="header">
        <h2><a href="#" class="site-icon">Hoàng Minh Nhật</a></h2>
        <div class="site-buttons">
            <button class="site-button" onclick="openSettings()"><i class="ri-settings-3-line"></i></button>
        </div>
    </header>

    <div id="WS-Settings">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h3 style="font-size: 14px; color: #556ee6;">WS SETTINGS</h3>
            <i class="ri-close-line" onclick="closeSettings()" style="cursor:pointer; font-size:20px;"></i>
        </div>
        <div style="margin-top:20px;">
            <span style="font-size: 11px; color: #999;">NỀN BACKGROUND</span>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top:10px;">
                <img src="./res/v5/img/bg.gif" width="100%" style="border-radius:4px;" onclick="setBg(this.src)">
                <img src="https://i.imgur.com/V4Y0u3A.png" width="100%" style="border-radius:4px;" onclick="setBg(this.src)">
            </div>
        </div>
    </div>

    <main id="td-main">
        <section class="td-content">
            <div class="about-me">
                <div class="avatar">
                    <img class="avatar-img" src="https://i.imgur.com/zH3lWwR.jpeg"> 
                    <img class="crown" src="./res/v5/img/crown/mong-vuot-rong.png">
                </div>
            </div>
            <h2 class="HoVaTen__"><span>Hoàng Minh Nhật</span></h2>

            <div class="love-days-box">
                <div id="love-time">0 Ngày 0 Giờ</div>
            </div>
            
            <div class="social-group" style="text-align:center; margin-top:20px;">
                <a href="https://www.facebook.com/minhnhat.2307" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" width="40" style="margin:10px;"></a>
                <a href="https://www.tiktok.com/@hoangminhnhat.2307" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" width="40" style="margin:10px;"></a>
            </div>
        </section>
    </main>

    <div class="real-time-box">
        <div id="current-time">00:00:00</div>
        <div id="current-date">Chủ Nhật, ngày 01 tháng 03 năm 2026</div>
    </div>

    <script src="./res/v5/libs/jquery/jquery-3.6.0.min.js"></script>
    <script>
        // 1. Đồng hồ thời gian thực
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('vi-VN', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Đếm ngày yêu (Chỉnh ngày ở đây)
        const startDate = new Date("2023-01-01T00:00:00");
        function updateLoveTime() {
            const diff = new Date() - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("love-time").innerHTML = `💖 Đã bên nhau ${days} ngày 💖`;
        }
        setInterval(updateLoveTime, 1000);
        updateLoveTime();

        // 3. Chức năng Menu
        function openSettings() { $('#WS-Settings').addClass('active'); }
        function closeSettings() { $('#WS-Settings').removeClass('active'); }
        function setBg(url) { $('#bodyMain').css('background-image', 'url('+url+')'); }

        $(document).ready(function() {
            $('#lockScreen').click(function() { $(this).fadeOut(500); });
        });
    </script>
</body>
</html>
