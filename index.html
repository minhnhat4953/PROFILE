        .td-lock-screen {

            z-index: 9999;

<body class="BodyStyle">
    <div class="td-lock-screen" id="lockScreen">
        <section class="td-welcome">
            <div class="medias">
                <video class="item_video" autoplay loop muted playsinline>
                    <source src="./res/v5/files/video/hutao.mp4" type="video/mp4">
                </video>
            </div>
            <div class="infos">

        <div class="loading-bg">
            <img class="loading-img" src="https://i.imgur.com/dxVZLOG.png">
            <div id="loading-percentage">0%</div>
        </div>
    </div>

    <main id="td-main">
        <header id="header">
            <h2><a href="#" class="site-icon">Hoàng Minh Nhật</a></h2>
            <div class="site-buttons">
                <button class="site-button mode-loveday"><i class="ri-heart-2-line"></i></button>
                <button class="site-button change-skin"><i class="ri-sun-line"></i></button>
            </div>
        </header>

        <section class="td-content">
            <div class="about-me">
                <div class="info-left"><span class="tag">Designer</span><span class="tag">Developer</span></div>
                <div class="avatar">
                    <img class="avatar-img" src="https://i.imgur.com/dxVZLOG.png">
                    <img class="crown" src="./res/v5/img/crown/mong-vuot-rong.png">
                </div>
                <div class="info-right"><span class="tag">Music</span><span class="tag">Gamer</span></div>
            </div>
            <h2 class="HoVaTen__"><span>Hoàng Minh Nhật</span></h2>
            
            <section id="hr-mod" style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
                <a href="https://www.facebook.com/minhnhat.2307" target="_blank">
                    <img src="./res/v5/img/social/facebook.webp" width="45" style="border-radius: 10px;">
                </a>
                <a href="https://zalo.me/0364953921" target="_blank">
                    <img src="./res/v5/img/social/zalo.webp" width="45" style="border-radius: 10px;">
                </a>
                <a href="https://www.tiktok.com/@hoangminhnhat.2307" target="_blank">
                    <img src="./res/v5/img/social/tiktok.webp" width="45" style="border-radius: 10px;">
                </a>
            </section>
        </section>
    </main>

    <marquee style="font-weight: bold; color: white; position: fixed; bottom: 60px; width: 100%;">
        Chào mừng bạn đến với Profile của Hoàng Minh Nhật - Chúc bạn một ngày tốt lành! ✨🔥
    </marquee>

    <footer id="footer">
        <a href="https://minhnhatvtv.mssg.me" target="_blank">&copy; Minh Nhật 2026</a>
    </footer>

    <script src="./res/v5/libs/jquery/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Xử lý Loading
            let pct = 0;
            let ld = setInterval(() => {
                pct += Math.floor(Math.random() * 5) + 5;
                if(pct >= 100) {
                    pct = 100;
                    clearInterval(ld);
                    setTimeout(() => { $('#loading-box').fadeOut(500); }, 300);
                }
                $('#loading-percentage').text(pct + '%');
            }, 50);

            // Click vào BẤT KỲ ĐÂU trên màn hình khóa để mở
            $('#lockScreen').on('click', function() {
                $(this).css('transform', 'translateY(-100%)');
                setTimeout(() => { $(this).hide(); }, 600);
            });
        });
