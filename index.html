<!DOCTYPE html>
<html lang="en" class="theme-custom">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Hoàng Minh Nhật Profile</title>
    <link rel="shortcut icon" href="https://i.imgur.com/dxVZLOG.png" type="image/x-icon">
    <link rel="stylesheet" href="./res/v5/css/ws.theme.css">
    <link rel="stylesheet" href="./res/v5/css/animation.css">
    <link rel="stylesheet" href="./res/v5/css/index.css?v=999">
    <link rel="stylesheet" href="./res/v5/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css" rel="stylesheet">
    <style>
        .td-lock-screen { cursor: pointer; z-index: 9999; }
        /* Hiện bảng cài đặt */
        .nk-sticky-toolbar { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 999; }
        .setting-btn { background: #00FFFF; border: none; padding: 10px; border-radius: 5px 0 0 5px; cursor: pointer; }
    </style>
</head>
<body class="BodyStyle" id="bodyBg" style="background-image: url('./res/v5/img/bg.gif');">

    <div class="td-lock-screen" id="lockScreen">
        <section class="td-welcome">
            <div class="medias">
                <video class="item_video" autoplay loop muted playsinline>
                    <source src="./res/v5/files/video/hutao.mp4" type="video/mp4">
                </video>
            </div>
            <div class="infos">
                <div class="logo-web-title">
                    <img class="logo-ws" src="https://i.imgur.com/dxVZLOG.png">
                    <span class="web-title">𝑯𝒐𝑩𝒂𝑴𝒚</span>
                </div>
                <span class="web_desc">Chạm bất kỳ đâu để vào Profile</span>
            </div>
        </section>
    </div>

    <div class="nk-sticky-toolbar">
        <button class="setting-btn" onclick="toggleSetting()"><i class="ri-settings-4-fill"></i></button>
    </div>

    <div id="SettingPanel" style="display:none; position:fixed; right:50px; top:20%; background:rgba(0,0,0,0.8); padding:20px; border-radius:10px; color:white; z-index:1000; width:250px;">
        <h3 style="font-size:16px; border-bottom:1px solid #555; padding-bottom:10px;">Cài Đặt</h3>
        
        <p>Chọn Nền:</p>
        <select onchange="changeBg(this.value)" style="width:100%; padding:5px; margin-bottom:15px; background:#333; color:white;">
            <option value="./res/v5/img/bg.gif">Mặc định (GIF)</option>
            <option value="./res/v5/img/anime-wall.jpg">Anime Wall</option>
            <option value="./res/v5/img/bg3.webp">Sosuke</option>
            <option value="https://api.thanhdieu.com/random-background.php">Ngẫu nhiên</option>
        </select>

        <p>Danh Sách Nhạc:</p>
        <div style="max-height:150px; overflow-y:auto;">
            <div onclick="playMusic('https://files.catbox.moe/kpkp2v.mp3')" style="cursor:pointer; padding:5px; border-bottom:1px solid #444;">🎵 Nhạc Chill 1</div>
            <div onclick="playMusic('https://files.catbox.moe/example.mp3')" style="cursor:pointer; padding:5px;">🎵 Nhạc Chill 2</div>
        </div>
        <button onclick="toggleSetting()" style="margin-top:15px; width:100%; padding:5px; background:red; border:none; color:white; border-radius:5px;">Đóng</button>
    </div>

    <main id="td-main">
        <header id="header">
            <h2><a href="#" class="site-icon">Hoàng Minh Nhật</a></h2>
        </header>

        <section class="td-content">
            <div class="about-me">
                <div class="avatar">
                    <img class="avatar-img" src="https://i.imgur.com/dxVZLOG.png">
                    <img class="crown" src="./res/v5/img/crown/mong-vuot-rong.png">
                </div>
            </div>
            <h2 class="HoVaTen__"><span>Hoàng Minh Nhật</span></h2>
            
            <section id="hr-mod" style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
                <a href="https://www.facebook.com/minhnhat.2307" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2023.png" width="40"></a>
                <a href="https://zalo.me/0364953921" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_Zalo.svg" width="40"></a>
                <a href="https://www.tiktok.com/@hoangminhnhat.2307" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" width="40"></a>
            </section>
        </section>
    </main>

    <audio id="myAudio" loop></audio>

    <script src="./res/v5/libs/jquery/jquery-3.6.0.min.js"></script>
    <script>
        // Mở khóa khi chạm bất kỳ đâu
        $('#lockScreen').click(function() {
            $(this).fadeOut(500);
            playMusic('https://files.catbox.moe/kpkp2v.mp3'); // Tự động phát nhạc khi mở
        });

        // Hàm hiện bảng cài đặt
        function toggleSetting() { $('#SettingPanel').fadeToggle(); }

        // Hàm đổi nền
        function changeBg(url) { $('#bodyBg').css('background-image', 'url('+url+')'); }

        // Hàm phát nhạc
        function playMusic(url) {
            let audio = document.getElementById('myAudio');
            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
